# ================================================
# 锻造台配置文件 - 工作台配方示例
# ================================================
# 此文件展示 crafting_table 类型的锻造台
# 不需要 GUI，直接在原版工作台中添加配方
# 不能用 /icf gui 指令打开此锻造台
# ================================================
# 【重要提示】
# 本插件支持堆叠物品的扣除！
# - amount 字段表示需要的物品数量（支持堆叠）
# - 玩家可以用堆叠的物品进行制作
# - 普通点击：制作 1 次，扣除所需数量
# - Shift 点击：尽可能多地制作，扣除相应数量
# ================================================

# 锻造台ID（唯一标识）
forge-id: "example_crafting_table"

settings:
  # 锻造台类型
  # crafting_table: 原版工作台配方类型
  # furnace: 原版熔炉配方类型
  # custom: 使用自定义布局文件（需要 GUI 界面）
  type: crafting_table

# 配方列表
# 可以定义多个配方
recipes:
  # ====================
  # 示例1：无序配方（无需精确位置）
  # exact_placement: false 或不写
  # ====================
  iron_sword:
    # 是否使用精确放置
    # 开启后需要按照配方位置摆放物品
    # 每个配方独立设置
    exact_placement: false
    
    # 产出物品
    output:
      # 物品来源
      # vanilla: Minecraft原版物品
      # itemcore: ItemCore插件自定义物品
      source: "vanilla"
      # 物品ID
      # 原版物品使用物品名称（如 IRON_SWORD）
      # ItemCore物品使用物品ID
      id: "IRON_SWORD"
      # 产出数量
      amount: 1
      # 是否检查耐久度（仅对可修复物品有效）
      check-durability: false
    # 所需材料（列表形式）
    materials:
      - source: "vanilla"
        id: "IRON_INGOT"
        amount: 2    # 需要 2 个铁锭（支持堆叠扣除）
        check-durability: false
      - source: "vanilla"
        id: "GOLD_INGOT"
        amount: 1
        check-durability: false
    
    # 制作条件（可选）
    # 可以定义多个条件，所有条件都满足才能制作
    conditions:
      # 等级条件
      - type: "level"
        value: 10              # 玩家需要达到10级
      
      # 权限条件（可选）
      # - type: "permission"
      #   value: "myplugin.forge.use"
      
      # 经济条件（可选，需要Vault插件）
      # - type: "money"
      #   value: 500            # 需要500金币
    

  # ====================
  # 示例2：有序配方（实际测试放置在2.5.8，在0.3.6也能成功制作）
  # exact_placement: true
  # 使用 slot 指定材料位置
  # 工作台 9个槽位编号：
  # 0 1 2
  # 3 4 5
  # 6 7 8
  # ====================
  diamond_sword:
    exact_placement: true
    
    output:
      source: "vanilla"
      id: "DIAMOND_SWORD"
      amount: 1
      check-durability: false
    materials:
      - source: "vanilla"
        id: "DIAMOND"
        amount: 3
        slot: 2   # 第一行第三列
        check-durability: false
      - source: "vanilla"
        id: "DIAMOND"
        amount: 3
        slot: 5   # 第二行第三列
        check-durability: false
      - source: "vanilla"
        id: "DIAMOND"
        amount: 3
        slot: 8   # 第三行第三列
        check-durability: false
