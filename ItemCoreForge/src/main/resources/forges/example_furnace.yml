# ================================================
# 锻造台配置文件 - 熔炉配方示例
# ================================================
# 此文件展示 furnace 类型的锻造台
# 不需要 GUI，直接在原版熔炉中添加配方
# 不能用 /icf gui 指令打开此锻造台
# ================================================
# 熔炉配方特点：
# - 1 个输入材料（amount 只能是 1）
# - 1 个燃料（暂时使用原版逻辑）
# - 1 个输出物品（amount 只能是 1）
# ================================================

# 锻造台ID（唯一标识）
forge-id: "example_furnace"

settings:
  # 锻造台类型
  # furnace: 原版熔炉配方类型
  # crafting_table: 原版工作台配方类型
  # custom: 使用自定义布局文件（需要 GUI 界面）
  type: furnace

# 配方列表
# 可以定义多个配方
recipes:
  iron_to_steel:
    # 输入材料
    # 【注意】amount 只能是 1，不支持数量选项
    input:
      source: "vanilla"
      id: "WHEAT"
      amount: 1
    
    # 输出物品
    # 【注意】amount 只能是 1，不支持数量选项
    output:
      source: "vanilla"
      id: "BREAD"
      amount: 1
    
    # 烹饪时间（tick，1 tick = 0.05 秒）
    # 原版熔炉：200 tick = 10 秒
    # 原版熔炉烧沙子：100 tick = 5 秒
    cook-time: 200
