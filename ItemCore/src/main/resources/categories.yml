# ========================================
# 分类配置
# ========================================
# 此文件定义了物品的分类
# 每个分类可以在 GUI 中显示为一个独立的分类
#
# 重要：只有在此文件中定义的分类才会被加载
# 物品文件必须通过 items-file 与分类绑定
#
# 修改后运行 /ic reload 生效
# ========================================

categories:
  # ========================================
  # 武器分类
  # ========================================
  weapons:
    # 分类 ID（用于命令和内部引用）
    # 注意：这是分类的唯一标识，不能与其他分类重复
    
    # 分类名称（内部名称）
    name: 武器
    
    # GUI 图标（必须是有效的 Minecraft 材质）
    # 支持格式: DIAMOND_SWORD, diamond_sword, diamond-sword
    icon: DIAMOND_SWORD
    
    # GUI 中的位置（-1 表示自动分配）
    # 0-8 为第一行，9-17 为第二行，以此类推
    slot: 19
    
    # GUI 中显示的名称（支持颜色代码）
    # 颜色代码: &0=黑 &1=深蓝 &2=深绿 &3=深蓝 &4=深红 &5=深紫 &6=金 &7=灰
    #         &8=深灰 &9=蓝 &a=绿 &b=天蓝 &c=红 &d=粉 &e=黄 &f=白
    display_name: "&c武器"
    
    # GUI 中显示的描述（支持颜色代码）
    lore:
      - "&7各种武器装备"
      - "&7点击查看所有武器"
    
    # 物品配置文件名（必须存在于 items/ 目录）
    # 这个文件包含此分类下的所有物品
    # 如果文件不存在，此分类将没有物品
    items_file: weapons.yml
    
    # （可选）权限要求
    # 如果设置，玩家需要此权限才能查看此分类
    # permission: "itemcore.category.weapons"

  # ========================================
  # 护甲分类
  # ========================================
  armors:
    name: 护甲
    icon: DIAMOND_CHESTPLATE
    slot: 20
    display_name: "&b护甲"
    lore:
      - "&7各种护甲装备"
      - "&7点击查看所有护甲"
    items_file: armors.yml

  # ========================================
  # 工具分类
  # ========================================
  tools:
    name: 工具
    icon: DIAMOND_PICKAXE
    slot: 21
    display_name: "&a工具"
    lore:
      - "&7各种工具"
      - "&7点击查看所有工具"
    items_file: tools.yml

  # ========================================
  # 其他分类
  # ========================================
  misc:
    name: 其他
    icon: NETHER_STAR
    slot: 22
    display_name: "&d其他"
    lore:
      - "&7其他物品"
      - "&7点击查看所有特殊物品"
    items_file: misc.yml

# ========================================
# 添加新分类示例（复制后取消注释并修改）
# ========================================
# my_category:
#   name: 我的分类
#   icon: DIAMOND
#   slot: 23
#   display_name: "&5我的分类"
#   lore:
#     - "&7我的自定义物品"
#     - "&7这是我创建的分类"
#   items_file: my_items.yml
# ========================================

# ========================================
# 配置说明
# ========================================
# 1. 添加新分类步骤:
#    a. 在此文件添加分类定义（参考上面的示例）
#    b. 在 items/ 目录创建对应的物品文件（如 my_items.yml）
#    c. 在物品文件中添加物品配置
#    d. 运行 /ic reload 重载
#
# 2. 删除分类步骤:
#    a. 在此文件删除分类定义
#    b. 可选：删除对应的物品文件
#    c. 运行 /ic reload 重载
#
# 3. 注意事项:
#    - 分类 ID 必须唯一
#    - items-file 必须指向 items/ 目录下存在的 yml 文件
#    - 物品文件中的物品 type 字段可以自定义，不一定要匹配分类 ID
# ========================================
