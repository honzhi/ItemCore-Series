# ========================================
# 通用设置
# ========================================

# 插件语言
# 可用值: zh-CN (简体中文), en-US (English)
language: "zh-CN"
# 调试模式
# 启用后将输出更详细的日志信息，用于问题排查
# 生产环境请设置为 false
debug_mode: false

# ========================================
# GUI 界面设置
# ========================================
gui:
  # GUI 窗口名称
  # 支持 Minecraft 颜色代码
  name: "物品库"

# ========================================
# Lore 刷新设置（实验性）
# ========================================
# 启用后，物品 lore 会定时刷新，使 /ic reload 后
# 玩家手中/背包内的 IC 物品 lore 自动更新
# 注意：该功能会定期扫描所有在线玩家的背包
#       大量玩家时请合理设置扫描间隔
lore_refresh:
  # 是否启用 lore 自动刷新
  enabled: false
  # 扫描间隔（单位：刻 tick）
  # 1 秒 = 20 tick，默认 100 tick = 5 秒
  interval: 100