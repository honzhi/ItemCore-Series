# ========================================
# 暴击配置
# ========================================
crit:
  # 默认暴击伤害百分比（当物品没有配置 crit_damage 时使用此值）
  # 示例：150 表示暴击时造成 1.5 倍伤害
  default_crit_damage: 150

# ========================================
# 适应之力配置
# ========================================
adaptive-force:
  # 每 1 点适应之力转化为多少攻击伤害
  # 示例：1.0 表示每点适应之力 +1 攻击伤害
  attack_conversion: 1.0

  # 每 1 点适应之力转化为多少法术强度
  # 示例：1.0 表示每点适应之力 +1 法术强度
  spell_conversion: 1.0

# ========================================
# 护甲/法抗减伤公式配置
# ========================================
# 可用变量:
#   - {damage} : 原始伤害
#   - {armor} : 护甲值（或法抗值）
#   - {penetration} : 穿透值（物理穿透/法术穿透）
#
# 可用运算符: + - * / ( )
# 示例:
#   - '{damage} - {armor}' : 简单固定值减伤
#   - '{damage} * (1 - {armor} / ({armor} + 100))' : 百分比减伤（原版公式）
# ========================================
defense_formulas:
  # 物理抗性减伤公式
  physical_resist: '{damage} * (1 - {armor} / ({armor} + 100))'

  # 法抗减伤公式
  spell_resist: '{damage} * (1 - {armor} / ({armor} + 100))'

# ========================================
# 穿甲计算顺序配置
# ========================================
# 可选值:
#   - percent_first : 先计算百分比穿甲，再计算固定穿甲（默认）
#   - flat_first    : 先计算固定穿甲，再计算百分比穿甲
# ========================================
penetration_order: percent_first
